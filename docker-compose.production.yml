services:
  app:
    image: ghcr.io/alandeveloper/kicks:latest
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.45
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"

      # Router HTTP — só redireciona para HTTPS
      - "traefik.http.routers.kicks-http.rule=Host(`kicks.alandeveloper.com.br`) || Host(`www.kicks.alandeveloper.com.br`)"
      - "traefik.http.routers.kicks-http.entrypoints=web"
      - "traefik.http.routers.kicks-http.middlewares=redirect-https"

      # Middleware de redirect
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

      # Router HTTPS — serve o app de verdade
      - "traefik.http.routers.kicks.rule=Host(`kicks.alandeveloper.com.br`) || Host(`www.kicks.alandeveloper.com.br`)"
      - "traefik.http.routers.kicks.entrypoints=websecure"
      - "traefik.http.routers.kicks.tls=true"
      - "traefik.http.routers.kicks.tls.certresolver=letsencrypt"
      - "traefik.http.services.kicks.loadbalancer.server.port=80"

networks:
  traefik-network:
    external: true
